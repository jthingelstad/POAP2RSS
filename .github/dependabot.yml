version: 2
# Dependabot updates are PR-only. Dependency updates are handled directly on
# main by the weekly maintenance process; vulnerability alerts remain enabled.
updates:
  - package-ecosystem: uv
    directory: "/"
    open-pull-requests-limit: 0
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: "/www"
    open-pull-requests-limit: 0
    schedule:
      interval: weekly
    ignore:
      # picomatch is a transitive dependency of @11ty/eleventy. The only
      # "patched" path Dependabot finds would downgrade Eleventy 3.1.6 -> 0.8.3
      # (fix_available: false), so its update job errors out. Ignore it here
      # and let Eleventy pull a patched picomatch in a future release.
      - dependency-name: "picomatch"
  - package-ecosystem: github-actions
    directory: "/"
    open-pull-requests-limit: 0
    schedule:
      interval: weekly
